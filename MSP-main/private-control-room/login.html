<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maa Sukriti Pharmaceuticals</title>
  <link rel="icon" type="image/png" href="/assets/logos/logo.png">
  
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  

</head>
<body class="admin-login-body">

  <div class="admin-login-card">
    <div class="admin-login-header">
      <h2>Maa Sukriti Pharmaceuticals</h2>
      <p>Admin Dashboard Login</p>
    </div>
    
    <div class="alert alert-error" id="loginErrorMsg" style="display: none; background-color: var(--error-light); color: var(--error); padding: 0.75rem; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 600; margin-bottom: 1rem; border-left: 4px solid var(--error);">
      Invalid credentials. Please try again.
    </div>
    
    <form id="adminLoginForm" onsubmit="executeLogin(event)">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="admin@mspbharat.com" required>
      </div>
      
      <div class="form-group" style="margin-bottom: var(--spacing-md);">
        <label class="form-label" for="loginPass">Password</label>
        <input type="password" id="loginPass" class="form-control" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%;" id="loginBtn">
        Log In To Dashboard
      </button>
    </form>
  </div>

  <!-- Lucide icons cdn -->
  <script src="https://unpkg.com/lucide@latest"></script>
  

  <script src="../js/auth.js"></script>
  
  <script>
    // Login form execution handler
    async function executeLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById("loginEmail").value.trim();
      const pass = document.getElementById("loginPass").value.trim();
      const btn = document.getElementById("loginBtn");
      const errBox = document.getElementById("loginErrorMsg");
      
      errBox.style.display = "none";
      btn.disabled = true;
      btn.innerText = "Signing in...";
      
      try {
        await handleAdminLogin(email, pass);
      } catch (err) {
        btn.disabled = false;
        btn.innerText = "Log In To Dashboard";
        errBox.innerText = err.message || "Failed to authenticate.";
        errBox.style.display = "block";
      }
    }

    lucide.createIcons();
  </script>
</body>
</html>
